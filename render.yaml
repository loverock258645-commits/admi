services:
  - type: web
    name: hospital-record-summary-tool
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD_HASH
        sync: false
